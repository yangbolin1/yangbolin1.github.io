# ==============================================================================
# 网站基础设置 (Site Settings)
# ==============================================================================
title: Camera Learning Lab                   # 网站主标题（会显示在浏览器标签页上）
email: your-email@example.com                # 👈 修改为你的邮箱
description: >-                              # 网站描述（用于 SEO 和搜索引擎抓取）
  专注于 Android Camera FW 框架层、HAL3 标准规范以及底层核心驱动接口的技术博客。
  深耕 TP2856/TP9951 到 RK3562 的 Zero-Copy 图像数据流。
author: Yang Bolin                           # 作者名字

# ==============================================================================
# 网址设置 (URL Settings) - 非常重要 ⚠️
# ==============================================================================
# 你的 GitHub Pages 域名，不要以斜杠 / 结尾
url: "https://yangbolin1.github.io"          # 👈 确认这是你的实际网址

# 如果你的仓库名就是 yangbolin1.github.io，这里必须留空！
# 如果你的仓库名是比如 camera-blog，这里填 "/camera-blog"
baseurl: ""                                  

# ==============================================================================
# 主题与外观 (Theme & Layout)
# ==============================================================================
theme: minima                                # 默认主题，如果换了主题这里需要改
# skin: dark                                 # （可选）有些主题支持一键暗黑模式

# 作者社交链接配置（Minima 默认主题支持在页脚显示）
github_username:  yangbolin1                 # 👈 修改为你的实际 GitHub 用户名
# twitter_username: your_twitter             # 如果有 Twitter 可以取消注释并填写

# ==============================================================================
# 编译与插件设置 (Build & Plugins)
# ==============================================================================
markdown: kramdown                           # 默认的 Markdown 渲染引擎
kramdown:
  input: GFM                                 # 使用 GitHub 风格的 Markdown 语法
  syntax_highlighter: rouge                  # 代码高亮引擎

plugins:
  - jekyll-feed                              # 生成 RSS 订阅
  - jekyll-seo-tag                           # 自动优化 SEO 标签

# 构建时忽略这些文件和文件夹，加快编译速度
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# ==============================================================================
# 文章固定链接格式 (Permalink)
# ==============================================================================
# 定义你文章的 URL 格式。
# 比如: https://yangbolin1.github.io/2026/06/24/camera-fw-contents/
permalink: /:year/:month/:day/:title/
